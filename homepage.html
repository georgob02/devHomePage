<!DOCTYPE html>
<html lang= "en">
    <head>
        <meta charset="utf-8">
        <title>Hjemmeside Georg Breen</title>
        <style>
            html, body {
                height: 100%;
                margin: 0px;
                background-color: #ffefdd;
            }
            .wrapper {
                display: flex;
                align-items: center;      
                justify-content: center;  
                flex-direction: column;
                height: 100%
            }
            .container {
                text-align: center;
                color: #141a23;
                font-family: Georgia, 'Times New Roman', Times, serif;
            }
        </style>
    </head>
    <header>
        <style>
            header {
                background-color: #ffefdd;
                color: #141a23;
                font-family: Georgia, 'Times New Roman', Times, serif;
                padding-top: 16px;
                display: flex;
                justify-content: top;
                align-items: start;
            }
            header button {
                background-color: #141a23;
                color: white;
                border-radius: 0%;
                padding: 10px 20px;
                text-align: center;
                display: inline-block;
                font-size: 16px;
                margin-top: 16px;
                cursor: pointer;
                font-weight: bold;
            }
        </style>
        <button>
            Hjem
        </button>
    </header>
    <body>
        <div class="wrapper">
        <div class="pictureContainer">
            <style>
                .pictureContainer {
                    background-color: #ffefdd;
                }
                .pictureContainer img {
                    width: 200px;
                    height: 200px;
                    border-radius: 50%;
                    object-fit: cover;
                }
            </style>
            <img src="/IMG_1207.jpeg">
        </div>
            <div class="container">
                <h1>Hei!<span 
                    style="font-size: 40px; padding-left: 8px;padding-right: 0px;">&#128075;
                </span>Jeg er Georg</h1>
                <div class="descriptionContainer">
                    <style>
                        .descriptionContainer p {
                            display: flex;
                            flex-direction: column;
                            margin: 4px;
                        }
                    </style>
                    <p>Jeg er en relativt nyutdannet utvikler som for tiden jobber i Frend Digital.</p>
                    <p>Jeg digger teknologi, og å lage kule løsninger som løser reelle behov</p>
                </div>
            </div>
            <div class="ButtonContainer">
            <style>
                .ButtonContainer {
                    background-color: #fff6ec;
                    color: white;
                    font-family: Georgia, 'Times New Roman', Times, serif;
                    padding-top: 16px;
                }
                .ButtonContainer button {
                    background-color: #141a23;
                    color: white;
                    border: 2px solid white;
                    border-radius: 0%;
                    padding: 10px 20px;
                    text-align: center;
                    display: inline-block;
                    font-size: 16px;
                    margin-top: 16px;
                    cursor: pointer;
                    font-weight: bold;
                }

            </style>
                <button>Hjem</button>
        </div>
    </div>
    </body>
    <footer>
        <style>
            footer {
                display: flex;
                justify-content: space-between;
                color: #141a23;
                padding-left: 8px;
                padding-right: 16px;
            }
            footer p {
                font-size: small;
            }
        </style>
        <p>&copy; 2026 Georg Breen</p>
        <p>Build with HTML, CSS and a little bit of love for Filippa </p>
    </footer>
</html>
